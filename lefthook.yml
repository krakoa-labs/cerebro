pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,js,json,jsonc}"
      run: npx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typecheck:
      glob: "*.ts"
      run: npx tsc --noEmit
    test:
      run: npx vitest related --run {staged_files}
